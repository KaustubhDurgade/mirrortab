<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Mirror</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="logo">⬡</span>
    <h1>Tab Mirror</h1>
  </div>

  <div id="status" class="status status--idle">
    <span id="status-dot" class="dot"></span>
    <span id="status-text">Not mirroring</span>
  </div>

  <div id="source-info" class="source-info hidden">
    <img id="source-favicon" src="" alt="" class="favicon" />
    <span id="source-title" class="source-title"></span>
  </div>

  <div class="actions">
    <button id="btn-start" class="btn btn--primary">Start Mirroring</button>
    <button id="btn-stop" class="btn btn--danger hidden">Stop Mirroring</button>
  </div>

  <div class="divider"></div>

  <section class="tab-targets">
    <div class="section-header">
      <h2 class="section-title">Mirror targets</h2>
      <label class="select-all-label">
        <input type="checkbox" id="select-all-tabs" checked />
        <span>All</span>
      </label>
    </div>
    <div id="tab-list" class="tab-list">
      <div class="tab-list-empty">No other tabs open</div>
    </div>
    <div id="mirror-count" class="mirror-count hidden"></div>
  </section>

  <div class="divider"></div>

  <section class="toggles">
    <h2 class="toggles-title">Mirror events</h2>
    <label class="toggle-row">
      <input type="checkbox" id="toggle-mouse" checked />
      <span>Mouse (click, move, drag)</span>
    </label>
    <label class="toggle-row">
      <input type="checkbox" id="toggle-keyboard" checked />
      <span>Keyboard</span>
    </label>
    <label class="toggle-row">
      <input type="checkbox" id="toggle-scroll" checked />
      <span>Scroll</span>
    </label>
    <label class="toggle-row">
      <input type="checkbox" id="toggle-input" checked />
      <span>Text input</span>
    </label>
  </section>

  <div class="divider"></div>

  <div class="inject-row">
    <button id="btn-inject" class="btn btn--ghost">↺ Re-inject into all tabs</button>
    <span id="inject-status" class="inject-status"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
